ing, or harmful to JioGames or its products.","Content must not misrepresent features, pricing, availability, or capabilities of JioGames Cloud."],notes:["Continued access to JioGames Cloud may be subject to your active participation in the Program.","JioGames may provide optional campaign guidelines, which you agree to reasonably adhere to."]},{section:4,title:"Non-Monetary Nature of Collaboration",clauses:["This Program is a non-monetary collaboration.","No fees, payments, reimbursements, or monetary consideration shall be payable by JioGames.","Access to JioGames Cloud is the sole consideration for participation.","You agree that you shall not raise any claims for compensation, now or in the future, in relation to this Program.","You are free to exit the Program after giving 10 days advance notice in writing via email to ____________@jioblast.com."]},{section:5,title:"Content Ownership & Usage Rights",clauses:["You retain ownership of the content created by you.","By participating in the Program, you grant JioGames an exclusive, worldwide, royalty-free, perpetual license to use, reproduce, edit, adapt, publish, distribute, and publicly display your content.","JioGames may share or repost such content across Jio's platforms, marketing channels, and promotional materials.","This usage shall not require any additional approval or payment."]},{section:6,title:"Access Code Usage & Restrictions",restrictions:["Access Codes are personal, non-transferable, and revocable.","Access Codes must not be shared, sold, sublicensed, or distributed in any manner.","Access Codes must not be used for any commercial exploitation beyond the intended purpose of the Program."],consequences_of_misuse:["Immediate suspension or termination of access.","Removal from the Program without notice."]},{section:7,title:"Compliance & Disclosures",obligations:["Comply with all applicable laws, regulations, and industry guidelines, including advertising and influencer disclosure norms.","Ensure that
